---
- name: "prometheus | Créer l'utilisateur système"
  ansible.builtin.user:
    name: "{{ prometheus_user }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: "prometheus | Créer les répertoires"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ prometheus_user }}"
    group: "{{ prometheus_user }}"
    mode: "0755"
  loop:
    - "{{ prometheus_config_dir }}"
    - "{{ prometheus_data_dir }}"

- name: "prometheus | Télécharger l'archive"
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
    dest: "/tmp/prometheus-{{ prometheus_version }}.tar.gz"
    mode: "0644"

- name: "prometheus | Extraire l'archive"
  ansible.builtin.unarchive:
    src: "/tmp/prometheus-{{ prometheus_version }}.tar.gz"
    dest: /tmp/
    remote_src: true

- name: "prometheus | Copier les binaires"
  ansible.builtin.copy:
    src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/{{ item }}"
    dest: "{{ prometheus_install_dir }}/{{ item }}"
    owner: "{{ prometheus_user }}"
    group: "{{ prometheus_user }}"
    mode: "0755"
    remote_src: true
  loop: [prometheus, promtool]

- name: "prometheus | Déployer prometheus.yml"
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ prometheus_config_dir }}/prometheus.yml"
    owner: "{{ prometheus_user }}"
    group: "{{ prometheus_user }}"
    mode: "0644"
  notify: restart prometheus

- name: "prometheus | Copier alert.rules.yml"
  ansible.builtin.copy:
    src: /vagrant/ansible/alert.rules.yml
    dest: "{{ prometheus_config_dir }}/alert.rules.yml"
    owner: "{{ prometheus_user }}"
    group: "{{ prometheus_user }}"
    mode: "0644"
    remote_src: true
  notify: restart prometheus

- name: "prometheus | Créer le service systemd"
  ansible.builtin.copy:
    dest: /etc/systemd/system/prometheus.service
    mode: "0644"
    content: |
      [Unit]
      Description=Prometheus
      After=network.target

      [Service]
      User={{ prometheus_user }}
      ExecStart={{ prometheus_install_dir }}/prometheus \
        --config.file={{ prometheus_config_dir }}/prometheus.yml \
        --storage.tsdb.path={{ prometheus_data_dir }} \
        --storage.tsdb.retention.time=15d \
        --web.listen-address=:{{ prometheus_port }} \
        --web.enable-lifecycle
      Restart=on-failure
      RestartSec=5s

      [Install]
      WantedBy=multi-user.target

- name: "prometheus | Activer et démarrer"
  ansible.builtin.systemd:
    name: prometheus
    enabled: true
    state: started
    daemon_reload: true

- name: "prometheus | Attendre le port {{ prometheus_port }}"
  ansible.builtin.wait_for:
    port: "{{ prometheus_port }}"
    timeout: 30
