---
# roles/prometheus/tasks/main.yml

# ── 1. Utilisateur système ────────────────────────────────────────────────────
- name: "prometheus | Créer l'utilisateur système"
  ansible.builtin.user:
    name: "{{ prometheus_user }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false

# ── 2. Créer les répertoires ──────────────────────────────────────────────────
- name: "prometheus | Créer les répertoires de config et données"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ prometheus_user }}"
    group: "{{ prometheus_user }}"
    mode: "0755"
  loop:
    - "{{ prometheus_config_dir }}"
    - "{{ prometheus_data_dir }}"
  # prometheus_data_dir contiendra la TSDB (base de données time-series).
  # Propriétaire = prometheus_user pour éviter les erreurs de permission au runtime.

# ── 3. Télécharger et extraire ────────────────────────────────────────────────
- name: "prometheus | Télécharger l'archive"
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
    dest: "/tmp/prometheus-{{ prometheus_version }}.tar.gz"
    mode: "0644"

- name: "prometheus | Extraire l'archive"
  ansible.builtin.unarchive:
    src: "/tmp/prometheus-{{ prometheus_version }}.tar.gz"
    dest: "/tmp/"
    remote_src: true

- name: "prometheus | Copier le binaire prometheus"
  ansible.builtin.copy:
    src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/prometheus"
    dest: "{{ prometheus_install_dir }}/prometheus"
    owner: "{{ prometheus_user }}"
    group: "{{ prometheus_user }}"
    mode: "0755"
    remote_src: true

- name: "prometheus | Copier promtool (outil de debug)"
  ansible.builtin.copy:
    src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/promtool"
    dest: "{{ prometheus_install_dir }}/promtool"
    owner: "{{ prometheus_user }}"
    group: "{{ prometheus_user }}"
    mode: "0755"
    remote_src: true
  # promtool permet de valider la config : promtool check config /etc/prometheus/prometheus.yml

# ── 4. Déployer la configuration ──────────────────────────────────────────────
- name: "prometheus | Déployer prometheus.yml depuis le template Jinja2"
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ prometheus_config_dir }}/prometheus.yml"
    owner: "{{ prometheus_user }}"
    group: "{{ prometheus_user }}"
    mode: "0644"
  notify: restart prometheus
  # notify : si le fichier change, le handler "restart prometheus" sera
  # déclenché en fin de play (idempotence).

# ── 5. Service systemd ────────────────────────────────────────────────────────
- name: "prometheus | Créer le service systemd"
  ansible.builtin.copy:
    dest: /etc/systemd/system/prometheus.service
    mode: "0644"
    content: |
      [Unit]
      Description=Prometheus Time Series Database
      After=network.target

      [Service]
      User={{ prometheus_user }}
      ExecStart={{ prometheus_install_dir }}/prometheus \
        --config.file={{ prometheus_config_dir }}/prometheus.yml \
        --storage.tsdb.path={{ prometheus_data_dir }} \
        --storage.tsdb.retention.time=15d \
        --web.listen-address=:{{ prometheus_port }} \
        --web.enable-lifecycle
      Restart=on-failure
      RestartSec=5s

      [Install]
      WantedBy=multi-user.target
  # --web.enable-lifecycle : permet de recharger la config sans redémarrer
  #   via POST http://localhost:9090/-/reload
  # --storage.tsdb.retention.time=15d : conserve 15 jours d'historique

- name: "prometheus | Recharger systemd"
  ansible.builtin.systemd:
    daemon_reload: true

- name: "prometheus | Activer et démarrer prometheus"
  ansible.builtin.systemd:
    name: prometheus
    enabled: true
    state: started

# ── 6. Vérification ───────────────────────────────────────────────────────────
- name: "prometheus | Attendre que l'UI soit disponible sur :{{ prometheus_port }}"
  ansible.builtin.wait_for:
    port: "{{ prometheus_port }}"
    timeout: 30

