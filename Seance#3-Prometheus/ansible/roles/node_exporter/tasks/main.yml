---
# roles/node_exporter/tasks/main.yml

# ── 1. Créer l'utilisateur système dédié ─────────────────────────────────────
- name: "node_exporter | Créer l'utilisateur système"
  ansible.builtin.user:
    name: "{{ node_exporter_user }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false
  # Pourquoi : principe du moindre privilège — le service ne doit pas
  # pouvoir se connecter en SSH ni écrire dans /home.

# ── 2. Télécharger l'archive ──────────────────────────────────────────────────
- name: "node_exporter | Télécharger l'archive"
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
    dest: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
    mode: "0644"
  # Risque : dépendance réseau au moment du provisioning.
  # Alternative hors-ligne : pré-télécharger et utiliser copy:.

# ── 3. Extraire le binaire ────────────────────────────────────────────────────
- name: "node_exporter | Extraire le binaire"
  ansible.builtin.unarchive:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
    dest: "/tmp/"
    remote_src: true

- name: "node_exporter | Copier le binaire dans /usr/local/bin"
  ansible.builtin.copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
    dest: "{{ node_exporter_install_dir }}/node_exporter"
    owner: "{{ node_exporter_user }}"
    group: "{{ node_exporter_user }}"
    mode: "0755"
    remote_src: true

# ── 4. Créer le service systemd ───────────────────────────────────────────────
- name: "node_exporter | Créer le service systemd"
  ansible.builtin.copy:
    dest: /etc/systemd/system/node_exporter.service
    mode: "0644"
    content: |
      [Unit]
      Description=Prometheus Node Exporter
      After=network.target

      [Service]
      User={{ node_exporter_user }}
      ExecStart={{ node_exporter_install_dir }}/node_exporter \
        --web.listen-address=:{{ node_exporter_port }}
      Restart=on-failure
      RestartSec=5s

      [Install]
      WantedBy=multi-user.target
  # Pourquoi systemd : redémarrage automatique, logs dans journald,
  # démarrage au boot sans intervention manuelle.

# ── 5. Activer et démarrer ────────────────────────────────────────────────────
- name: "node_exporter | Recharger systemd"
  ansible.builtin.systemd:
    daemon_reload: true

- name: "node_exporter | Activer et démarrer node_exporter"
  ansible.builtin.systemd:
    name: node_exporter
    enabled: true
    state: started

# ── 6. Vérification immédiate ─────────────────────────────────────────────────
- name: "node_exporter | Vérifier que le port {{ node_exporter_port }} est ouvert"
  ansible.builtin.wait_for:
    port: "{{ node_exporter_port }}"
    timeout: 15
  # Tester après chaque étape : si le port n'est pas ouvert dans 15s,
  # le playbook échoue ici avec un message clair.
