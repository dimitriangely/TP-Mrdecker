---
- name: "node_exporter | Créer l'utilisateur système"
  ansible.builtin.user:
    name: "{{ node_exporter_user }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: "node_exporter | Télécharger l'archive"
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
    dest: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
    mode: "0644"

- name: "node_exporter | Extraire le binaire"
  ansible.builtin.unarchive:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
    dest: "/tmp/"
    remote_src: true

- name: "node_exporter | Copier le binaire"
  ansible.builtin.copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
    dest: "{{ node_exporter_install_dir }}/node_exporter"
    owner: "{{ node_exporter_user }}"
    group: "{{ node_exporter_user }}"
    mode: "0755"
    remote_src: true

- name: "node_exporter | Créer le service systemd"
  ansible.builtin.copy:
    dest: /etc/systemd/system/node_exporter.service
    mode: "0644"
    content: |
      [Unit]
      Description=Prometheus Node Exporter
      After=network.target

      [Service]
      User={{ node_exporter_user }}
      ExecStart={{ node_exporter_install_dir }}/node_exporter \
        --web.listen-address=:{{ node_exporter_port }}
      Restart=on-failure
      RestartSec=5s

      [Install]
      WantedBy=multi-user.target

- name: "node_exporter | Activer et démarrer"
  ansible.builtin.systemd:
    name: node_exporter
    enabled: true
    state: started
    daemon_reload: true

- name: "node_exporter | Vérifier le port {{ node_exporter_port }}"
  ansible.builtin.wait_for:
    port: "{{ node_exporter_port }}"
    timeout: 15
